name: gitleaks

# Blocks secrets from ever being committed again. Scans the full repository
# history on every push and PR with the gitleaks CLI directly — the marketplace
# action does an incremental diff that breaks on a repo's parent-less root commit.
on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history, so a secret in any commit fails the run
      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repository history
        run: gitleaks git --config .gitleaks.toml --redact --no-banner --verbose
