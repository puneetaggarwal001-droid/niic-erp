spring:
  application:
    name: erp-backend
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

erp:
  jwt:
    # Dev-only secret. Override with the ERP_JWT_SECRET env var in any real deployment.
    secret: ${ERP_JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    expiration-minutes: 480
  cors:
    allowed-origins: ${ERP_CORS_ORIGINS:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:file:./data/erp-dev;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${ERP_DB_URL:jdbc:postgresql://localhost:5432/niic_erp}
    username: ${ERP_DB_USER:erp}
    password: ${ERP_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
