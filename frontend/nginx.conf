server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API calls go to the backend container. Because the browser only ever talks
    # to this one origin, the app's relative "/api" baseURL works and no CORS is
    # involved for normal use.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
